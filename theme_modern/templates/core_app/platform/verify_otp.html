<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | WebPress</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/htmx.org@1.9.11" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        primary: '#6366f1',
                    },
                }
            }
        }
    </script>
    <style>
        .htmx-request.progress-bar { display: block !important; animation: progress 1s infinite alternate; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-animate { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-slate-900 text-slate-300 font-body antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden" hx-boost="true" hx-indicator=".progress-bar">
    
    <div class="progress-bar hidden fixed top-0 left-0 h-1 bg-indigo-500 z-[9999]"></div>

    <div class="fixed inset-0 z-[-1] pointer-events-none">
        <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-900/40 via-slate-900 to-slate-900"></div>
        <div class="absolute bottom-[-20%] left-[-10%] w-[50%] h-[50%] bg-indigo-600/10 blur-[120px] rounded-full mix-blend-screen"></div>
        <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-cyan-600/10 blur-[120px] rounded-full mix-blend-screen"></div>
    </div>

    <div class="fixed top-6 right-6 z-50 flex flex-col gap-3 pointer-events-none">
        {% if messages %}
            {% for message in messages %}
                <div class="toast-animate pointer-events-auto flex items-center gap-3 px-5 py-4 bg-slate-800/80 backdrop-blur-xl border border-slate-700/50 rounded-xl shadow-2xl">
                    <span class="w-2 h-2 rounded-full {% if message.tags == 'error' %}bg-red-500{% elif message.tags == 'success' %}bg-emerald-500{% else %}bg-indigo-500{% endif %}"></span>
                    <p class="text-sm font-medium text-slate-200">{{ message }}</p>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <div class="w-full max-w-[420px] z-10 animate-fade-in-up py-8">
        <div class="flex items-center justify-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 border border-indigo-500/20 shadow-lg group-hover:scale-105 transition-transform duration-300">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
        </div>

        <div class="bg-slate-800/40 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-8 sm:p-10 shadow-2xl relative overflow-hidden text-center">
            <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent pointer-events-none"></div>
            
            <h2 class="text-2xl font-sans font-bold text-white tracking-tight relative z-10">Verify Your Email</h2>
            <p class="text-slate-400 text-sm mt-3 mb-8 relative z-10">We've sent a 6-digit One Time Password (OTP) to your email. Please enter it below to activate your account.</p>

            <form method="POST" action="{% url 'verify_otp' %}" class="relative z-10">
                {% csrf_token %}
                <div class="mb-8">
                    <label for="otp" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 text-left">Security Code</label>
                    <input type="text" id="otp" name="otp" placeholder="123456" maxlength="6" pattern="\d{6}" title="Please enter a 6 digit code" required autofocus
                        class="w-full px-4 py-4 bg-slate-900/50 border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl text-white placeholder-slate-600 transition-all duration-200 text-center text-3xl tracking-[0.5em] font-mono outline-none">
                </div>
                
                <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition-all duration-300 shadow-[0_0_20px_rgba(99,102,241,0.2)] hover:shadow-[0_0_30px_rgba(99,102,241,0.4)] flex items-center justify-center gap-2">
                    Verify & Activate
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </form>

            <div class="mt-8 text-center relative z-10 text-sm">
                <p class="text-slate-500 mb-6 font-medium">Didn't receive it? Check your spam folder.</p>
                <a href="{% url 'signup' %}" class="inline-flex items-center gap-2 text-indigo-400 font-semibold hover:text-indigo-300 transition-colors group">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-4 h-4 group-hover:-translate-x-1 transition-transform">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to sign up
                </a>
            </div>
        </div>
    </div>
</body>
</html>
